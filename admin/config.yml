backend:
  name: github
  repo: dave123ol/Sciency # your GitHub repo
  branch: main            # change if your default branch is not "main"

media_folder: "assets/uploads"   # Where images/files will be saved in repo
public_folder: "/assets/uploads" # How they’ll be accessed on the site

collections:
  - name: "posts"
    label: "Blog Posts"
    folder: "_posts"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Excerpt", name: "excerpt", widget: "text", required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "books"
    label: "Books"
    files:
      - label: "Books List"
        name: "books"
        file: "_books/books.json"
        fields:
          - label: "Books"
            name: "books"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "PDF File", name: "file", widget: "file" }
