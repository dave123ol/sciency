backend:
  name: git-gateway
  branch: main   # Change if your repo’s default branch is different

media_folder: "static/uploads"   # Where uploaded files will be stored in repo
public_folder: "/uploads"        # How those files are accessed by the site

collections:
  - name: "posts"
    label: "Posts"
    folder: "posts"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "books"
    label: "Books"
    folder: "books"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "File", name: "file", widget: "file" }
