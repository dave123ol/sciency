<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Books - Sciency</title>
    <link rel="stylesheet" href="assets/style.css">
    <style>
        .books-section {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        .book {
            background: white;
            border-radius: 6px;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .book h2 {
            color: #002855;
            font-size: 1.2rem;
            margin-bottom: 8px;
        }
        .book p {
            font-size: 0.95rem;
            color: #555;
            margin-bottom: 10px;
        }
        .book a {
            display: inline-block;
            background: #002855;
            color: white;
            padding: 8px 12px;
            border-radius: 4px;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .book a:hover {
            background: #004080;
        }
    </style>
</head>
<body>

<header>
    <img src="assets/logo.png" alt="Sciency Logo" class="logo">
    <nav>
        <a href="index.html">Home</a>
        <a href="blog.html">Blog</a>
        <a href="books.html" class="active">Books</a>
        <a href="about.html">About Us</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<section class="books-section">
    <h1>Science Books</h1>
    <div id="books-list" class="books-grid"></div>
</section>

<footer>
    <p>© 2025 Sciency. All rights reserved.</p>
</footer>

<script>
    fetch('_books/books.json')
        .then(response => response.json())
        .then(data => {
            const container = document.getElementById('books-list');
            container.innerHTML = data.books.map(book => `
                <div class="book">
                    <h2>${book.title}</h2>
                    <p>${book.description}</p>
                    <a href="${book.file}" target="_blank">📄 View / Download</a>
                </div>
            `).join('');
        })
        .catch(error => {
            console.error('Error loading books:', error);
            document.getElementById('books-list').innerHTML = '<p>Unable to load books.</p>';
        });
</script>

</body>
</html>
