<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sciency - Home</title>
    <link rel="stylesheet" href="assets/style.css">
    <style>
        .featured-books {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .featured-books h2 {
            color: #002855;
            margin-bottom: 20px;
        }
        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        .book {
            background: white;
            border-radius: 6px;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .book h3 {
            color: #002855;
            font-size: 1.1rem;
            margin-bottom: 8px;
        }
        .book p {
            font-size: 0.9rem;
            color: #555;
            margin-bottom: 10px;
        }
        .book a {
            display: inline-block;
            background: #002855;
            color: white;
            padding: 6px 10px;
            border-radius: 4px;
            text-decoration: none;
            font-size: 0.85rem;
        }
        .book a:hover {
            background: #004080;
        }
    </style>
</head>
<body>
    <header>
        <img src="assets/logo.png" alt="Sciency Logo" class="logo">
        <nav>
            <a href="index.html" class="active">Home</a>
            <a href="blog.html">Blog</a>
            <a href="books.html">Books</a>
            <a href="about.html">About Us</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <section class="hero">
        <h1>Welcome to Sciency</h1>
        <p>Your hub for science updates and knowledge.</p>
    </section>

    <section class="posts">
        <h2>Latest Updates</h2>
        <div id="post-list">
            <!-- Blog posts will be loaded here dynamically -->
        </div>
    </section>

    <section class="featured-books">
        <h2>Featured Books</h2>
        <div id="featured-books" class="books-grid"></div>
        <p style="text-align:center; margin-top:15px;">
            <a href="books.html">📚 View All Books</a>
        </p>
    </section>

    <footer>
        <p>&copy; 2025 Sciency. All Rights Reserved.</p>
    </footer>

    <script src="assets/script.js"></script>
    <script>
        fetch('_books/books.json')
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('featured-books');
                const booksToShow = data.books.slice(0, 3); // first 3 books
                container.innerHTML = booksToShow.map(book => `
                    <div class="book">
                        <h3>${book.title}</h3>
                        <p>${book.description}</p>
                        <a href="${book.file}" target="_blank">View / Download</a>
                    </div>
                `).join('');
            })
            .catch(error => {
                console.error('Error loading featured books:', error);
                document.getElementById('featured-books').innerHTML = '<p>Unable to load books.</p>';
            });
    </script>
</body>
</html>
